<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أداة تصوير الشاشة</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 400px; background: #000; border: 2px solid #333; }
        .controls { margin-top: 20px; }
        button { padding: 15px 25px; font-size: 16px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>أداة تصوير الشاشة للديسكورد</h1>
    <video id="video" autoplay playsinline></video>
    
    <div class="controls">
        <button id="startBtn">بدء مشاركة الشاشة</button>
        <button id="captureBtn" disabled>إرسال لقطة للديسكورد</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const captureBtn = document.getElementById('captureBtn');
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1342745265324691466/W7HmR1cF97HaP_sQkkLrt2ZqaSOrv0PRbg6V4oqjwTf2Gs56g8e-yByFx7LPcZF-3v1W";

        // 1. بدء البث
        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                video.srcObject = stream;
                captureBtn.disabled = false;
            } catch (err) {
                alert("تعذر الوصول للشاشة. تأكد من أنك تستخدم HTTPS وافتح الرابط في متصفح كروم.");
            }
        };

        // 2. التقاط وإرسال
        captureBtn.onclick = async () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'screenshot.png');
                formData.append('payload_json', JSON.stringify({ content: "لقطة شاشة جديدة!" }));

                const res = await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
                if (res.ok) alert("تم الإرسال بنجاح!");
                else alert("فشل الإرسال.");
            });
        };
    </script>
</body>
</html>
